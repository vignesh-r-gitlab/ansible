- name: install packages
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: keep and remove somepackages
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"

    loop:
     - { name: "nginx", state: "absent" }
     - { name: "mysql", state: "present" }
     - { name: "zip", state: "present" }