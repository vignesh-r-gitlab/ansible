- name: demo on filters
  hosts: local 
  connection: local
  vars: 
    topics: linux, shell, ansible, terraform
  tagsmap:
    name: ansible
    project: roboshop
    component: catalogue
  tasks:
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi vignesh, {{ GREETING | default('goodmorning') }}"

  - name: convert string to list
    ansible.builtin.debug:
      msg: " {{ topics | split(',') }}"

  - name: convert map to list 
    ansible.builtin.debug:
      msg: "{{ tags | dict2items }}" 
