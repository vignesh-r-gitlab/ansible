- name: facts gathering
  hosts: local
  connection: local
  tasks:
  - name: print facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"

  - name: check redhat or not
    ansible.builtin.debug:
      msg: "yes, the os is redhat"
    when: ansible_facts.os_family == "RedHat"

  - name: check ubuntu or not
    ansible.builtin.debug:
      msg: "yes, the os is ubuntu"
    when: ansible_facts.os_family == "ubuntu"


